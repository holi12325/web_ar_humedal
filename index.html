<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .scanning-ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
        font-size: 1.2em;
        text-align: center;
        z-index: 10;
        transition: opacity 0.5s;
      }
      .a-enter-vr-button {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="scanning-ui" class="scanning-ui">
      <p>Apunta la cámara a una de las obras...</p>
    </div>

    <a-scene
      id="main-scene"
      mindar-image="imageTargetSrc: [TU_ENLACE_TARGET_MIND_AQUI]; 
                    filterMinCF: 0.005; 
                    filterBeta: 1000; 
                    missTolerance: 5; 
                    warmupTolerance: 5;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      
      <a-assets>
        <img id="img-0-0" src="[ENLACE_IMAGEN_0_CAPA_1]" crossorigin="anonymous" />
        <img id="img-0-1" src="[ENLACE_IMAGEN_0_CAPA_2]" crossorigin="anonymous" />
        <img id="img-0-2" src="[ENLACE_IMAGEN_0_CAPA_3]" crossorigin="anonymous" />
        <img id="img-0-3" src="[ENLACE_IMAGEN_0_CAPA_4]" crossorigin="anonymous" />
        <img id="img-0-4" src="[ENLACE_IMAGEN_0_CAPA_5]" crossorigin="anonymous" />
        <img id="img-0-5" src="[ENLACE_IMAGEN_0_CAPA_6]" crossorigin="anonymous" />
        <img id="img-0-6" src="[ENLACE_IMAGEN_0_CAPA_7]" crossorigin="anonymous" />

        <img id="img-1-0" src="[ENLACE_IMAGEN_1_CAPA_1]" crossorigin="anonymous" />
        <img id="img-1-1" src="[ENLACE_IMAGEN_1_CAPA_2]" crossorigin="anonymous" />
        <img id="img-1-2" src="[ENLACE_IMAGEN_1_CAPA_3]" crossorigin="anonymous" />
        <img id="img-1-3" src="[ENLACE_IMAGEN_1_CAPA_4]" crossorigin="anonymous" />
        <img id="img-1-4" src="[ENLACE_IMAGEN_1_CAPA_5]" crossorigin="anonymous" />
        <img id="img-1-5" src="[ENLACE_IMAGEN_1_CAPA_6]" crossorigin="anonymous" />
        <img id="img-1-6" src="[ENLACE_IMAGEN_1_CAPA_7]" crossorigin="anonymous" />

        <img id="img-2-0" src="[ENLACE_IMAGEN_2_CAPA_1]" crossorigin="anonymous" />
        <img id="img-2-1" src="[ENLACE_IMAGEN_2_CAPA_2]" crossorigin="anonymous" />
        <img id="img-2-2" src="[ENLACE_IMAGEN_2_CAPA_3]" crossorigin="anonymous" />
        <img id="img-2-3" src="[ENLACE_IMAGEN_2_CAPA_4]" crossorigin="anonymous" />
        <img id="img-2-4" src="[ENLACE_IMAGEN_2_CAPA_5]" crossorigin="anonymous" />
        <img id="img-2-5" src="[ENLACE_IMAGEN_2_CAPA_6]" crossorigin="anonymous" />
        <img id="img-2-6" src="[ENLACE_IMAGEN_2_CAPA_7]" crossorigin="anonymous" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-0" mindar-image-target="targetIndex: 0">
        <a-plane src="#img-0-0" position="0 0 0"    height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-0-1" position="0 0 0.15" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-0-2" position="0 0 0.30" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-0-3" position="0 0 0.45" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-0-4" position="0 0 0.60" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-0-5" position="0 0 0.75" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-0-6" position="0 0 0.90" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
      </a-entity>

      <a-entity id="target-1" mindar-image-target="targetIndex: 1">
        <a-plane src="#img-1-0" position="0 0 0"    height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-1-1" position="0 0 0.15" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-1-2" position="0 0 0.30" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-1-3" position="0 0 0.45" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-1-4" position="0 0 0.60" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-1-5" position="0 0 0.75" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-1-6" position="0 0 0.90" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
      </a-entity>

      <a-entity id="target-2" mindar-image-target="targetIndex: 2">
        <a-plane src="#img-2-0" position="0 0 0"    height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-2-1" position="0 0 0.15" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-2-2" position="0 0 0.30" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-2-3" position="0 0 0.45" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-2-4" position="0 0 0.60" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-2-5" position="0 0 0.75" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
        <a-plane src="#img-2-6" position="0 0 0.90" height="1.5" width="1.5" material="shader: flat; transparent: true"></a-plane>
      </a-entity>

      <script>
        document.addEventListener("DOMContentLoaded", () => {
          const scanningUI = document.querySelector("#scanning-ui");
          let targetsEncontrados = 0;

          // Recorremos los 3 targets para añadirles los detectores de eventos
          for (let i = 0; i < 3; i++) {
            const targetEntity = document.querySelector(`#target-${i}`);
            
            targetEntity.addEventListener("targetFound", () => {
              targetsEncontrados++;
              // Si se encuentra al menos un target, ocultamos el cartel
              scanningUI.style.display = "none";
            });

            targetEntity.addEventListener("targetLost", () => {
              targetsEncontrados--;
              // Si ya no hay ningún target a la vista, volvemos a mostrar el cartel
              if (targetsEncontrados <= 0) {
                targetsEncontrados = 0; // Por seguridad
                scanningUI.style.display = "flex";
              }
            });
          }
        });
      </script>
    </a-scene>
  </body>
</html>
