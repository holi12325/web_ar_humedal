<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
      AFRAME.registerComponent('smooth-tracking', {
        schema: {
          // Factor de suavizado: 0 = sin movimiento, 1 = sin suavizado
          // 0.15 da un lag visual muy pequeño pero elimina casi todo el jitter
          lerpFactor: { type: 'number', default: 0.15 }
        },

        init: function () {
          this.isTracking = false;

          // Vectores de destino (lo que MindAR reporta)
          this.targetPos = new THREE.Vector3();
          this.targetQuat = new THREE.Quaternion();
          this.targetScale = new THREE.Vector3(1, 1, 1);

          // Vectores actuales (lo que realmente se renderiza, suavizados)
          this.currentPos = new THREE.Vector3();
          this.currentQuat = new THREE.Quaternion();
          this.currentScale = new THREE.Vector3(1, 1, 1);

          this.el.addEventListener('targetFound', () => {
            this.isTracking = true;

            // Al encontrar el target por primera vez, inicializamos
            // current == target para evitar un "vuelo" desde el origen
            this.currentPos.copy(this.el.object3D.position);
            this.currentQuat.copy(this.el.object3D.quaternion);
            this.currentScale.copy(this.el.object3D.scale);
          });

          this.el.addEventListener('targetLost', () => {
            this.isTracking = false;
          });
        },

        tick: function (time, delta) {
          if (!this.isTracking) return;

          // Factor de lerp ajustado al delta para que sea independiente del framerate
          // A 60fps delta≈16ms → factor≈0.15; a 30fps delta≈33ms → factor≈0.27
          const t = 1 - Math.pow(1 - this.data.lerpFactor, delta / 16.67);

          // Capturamos la posición "cruda" que MindAR actualiza cada frame
          this.targetPos.copy(this.el.object3D.position);
          this.targetQuat.copy(this.el.object3D.quaternion);
          this.targetScale.copy(this.el.object3D.scale);

          // Interpolamos suavemente hacia el target
          this.currentPos.lerp(this.targetPos, t);
          this.currentQuat.slerp(this.targetQuat, t);
          this.currentScale.lerp(this.targetScale, t);

          // Aplicamos los valores suavizados
          this.el.object3D.position.copy(this.currentPos);
          this.el.object3D.quaternion.copy(this.currentQuat);
          this.el.object3D.scale.copy(this.currentScale);
        }
      });
    </script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* Con el atributo embedded, a-scene no toma el tamaño del viewport por sí solo */
      a-scene {
        width: 100%;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
      }
      .scanning-ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
        font-size: 1.2em;
        text-align: center;
        z-index: 10;
        transition: opacity 0.5s;
      }
      .a-enter-vr-button {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="scanning-ui" class="scanning-ui">
      <p>Apunta la cámara a una de las obras...</p>
    </div>

    <a-scene
      id="main-scene"
      mindar-image="imageTargetSrc: https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/targets.mind;
                    filterMinCF: 0.005;
                    filterBeta: 0.05;
                    missTolerance: 5;
                    warmupTolerance: 5;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >

      <a-assets>
        <img id="img-0-0" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_0_c1.webp" crossorigin="anonymous" />
        <img id="img-0-1" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_0_C2.webp" crossorigin="anonymous" />
        <img id="img-0-2" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_0_c3.webp" crossorigin="anonymous" />

        <img id="img-1-0" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c1.webp" crossorigin="anonymous" />
        <img id="img-1-1" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c2.webp" crossorigin="anonymous" />
        <img id="img-1-2" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c3.webp" crossorigin="anonymous" />
        <img id="img-1-3" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c4.webp" crossorigin="anonymous" />
        <img id="img-1-4" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c5.webp" crossorigin="anonymous" />
        <img id="img-1-5" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c6.webp" crossorigin="anonymous" />
        <img id="img-1-6" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c7.webp" crossorigin="anonymous" />

        <img id="img-2-0" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_2_c1.webp" crossorigin="anonymous" />
        <img id="img-2-1" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_2_c2.webp" crossorigin="anonymous" />
        <img id="img-2-2" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_2_c3.webp" crossorigin="anonymous" />
        <img id="img-2-3" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_2_c4.webp" crossorigin="anonymous" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- smooth-tracking reemplaza a freeze-tracking en los 3 targets -->

      <a-entity id="target-0" mindar-image-target="targetIndex: 0" smooth-tracking="lerpFactor: 0.15">
        <a-plane src="#img-0-0" position="0 0 0"    height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-0-1" position="0 0 0.15" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-0-2" position="0 0 0.30" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
      </a-entity>

      <a-entity id="target-1" mindar-image-target="targetIndex: 1" smooth-tracking="lerpFactor: 0.15">
        <a-plane src="#img-1-0" position="0 0 0"    height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-1" position="0 0 0.15" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-2" position="0 0 0.30" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-3" position="0 0 0.45" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-4" position="0 0 0.60" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-5" position="0 0 0.75" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-6" position="0 0 0.90" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
      </a-entity>

      <a-entity id="target-2" mindar-image-target="targetIndex: 2" smooth-tracking="lerpFactor: 0.15">
        <a-plane src="#img-2-0" position="0 0 0"    height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-2-1" position="0 0 0.15" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-2-2" position="0 0 0.30" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-2-3" position="0 0 0.45" height="1.5" width="1.94" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
      </a-entity>

    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const scanningUI = document.querySelector("#scanning-ui");
        const targetsActivos = new Set();

        for (let i = 0; i < 3; i++) {
          const targetEntity = document.querySelector(`#target-${i}`);

          targetEntity.addEventListener("targetFound", () => {
            targetsActivos.add(i);
            scanningUI.style.display = "none";
          });

          targetEntity.addEventListener("targetLost", () => {
            targetsActivos.delete(i);
            if (targetsActivos.size === 0) {
              scanningUI.style.display = "flex";
            }
          });
        }
      });
    </script>

  </body>
</html>
