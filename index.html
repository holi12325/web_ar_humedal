<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      AFRAME.registerComponent('freeze-tracking', {
        init: function () {
          this.congelado = false;
          // Creamos una matriz vacía para guardar la posición, rotación y escala
          this.matrizGuardada = new THREE.Matrix4();
          this.timeoutId = null;
          
          this.el.addEventListener('targetFound', () => {
            // Esperamos 500ms para que el tracking se estabilice antes de congelarlo
            this.timeoutId = setTimeout(() => {
              this.congelado = true;
              // Hacemos el "Bake" copiando la matriz exacta de ese frame
              this.matrizGuardada.copy(this.el.object3D.matrix);
            }, 500);
          });

          this.el.addEventListener('targetLost', () => {
            // Si el usuario aparta la cámara, cancelamos todo y soltamos el freeze
            clearTimeout(this.timeoutId);
            this.congelado = false;
          });
        },
        tick: function () {
          // Si está congelado, sobreescribimos la posición temblorosa de MindAR 
          // con nuestra matriz guardada en cada frame.
          if (this.congelado) {
            this.el.object3D.matrix.copy(this.matrizGuardada);
          }
        }
      });
    </script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .scanning-ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
        font-size: 1.2em;
        text-align: center;
        z-index: 10;
        transition: opacity 0.5s;
      }
      .a-enter-vr-button {
        display: none !important;
      }
    </style>
  </head>
