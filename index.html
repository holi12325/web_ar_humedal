<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      AFRAME.registerComponent('freeze-tracking', {
        init: function () {
          this.congelado = false;
          this.matrizGuardada = new THREE.Matrix4();
          this.timeoutId = null;
          
          this.el.addEventListener('targetFound', () => {
            // CORRECCIÓN 2: Cancelar timeout previo antes de crear uno nuevo
            clearTimeout(this.timeoutId);

            this.timeoutId = setTimeout(() => {
              this.congelado = true;
              // CORRECCIÓN 1: Desactivar matrixAutoUpdate para que Three.js
              // no sobreescriba nuestra matriz congelada en cada frame
              this.el.object3D.matrixAutoUpdate = false;
              this.matrizGuardada.copy(this.el.object3D.matrix);
              this.el.object3D.matrix.copy(this.matrizGuardada);
            }, 500);
          });

          this.el.addEventListener('targetLost', () => {
            clearTimeout(this.timeoutId);
            this.congelado = false;
            // CORRECCIÓN 1: Reactivar matrixAutoUpdate al soltar el freeze
            this.el.object3D.matrixAutoUpdate = true;
          });
        },

        tick: function () {
          if (this.congelado) {
            this.el.object3D.matrix.copy(this.matrizGuardada);
          }
        }
      });
    </script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .scanning-ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
        font-size: 1.2em;
        text-align: center;
        z-index: 10;
        transition: opacity 0.5s;
      }
      .a-enter-vr-button {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="scanning-ui" class="scanning-ui">
      <p>Apunta la cámara a una de las obras...</p>
    </div>

    <a-scene
      id="main-scene"
      mindar-image="imageTargetSrc: https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/targets.mind; 
                    filterMinCF: 0.001; 
                    filterBeta: 10; 
                    missTolerance: 10; 
                    warmupTolerance: 5;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      
      <a-assets>
        <img id="img-0-0" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_0_c1.webp" crossorigin="anonymous" />
        <img id="img-0-1" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_0_C2.webp" crossorigin="anonymous" />
        <img id="img-0-2" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_0_c3.webp" crossorigin="anonymous" />

        <img id="img-1-0" src="[ENLACE_IMAGEN_1_CAPA_1]" crossorigin="anonymous" />
        <img id="img-1-1" src="[ENLACE_IMAGEN_1_CAPA_2]" crossorigin="anonymous" />
        <img id="img-1-2" src="[ENLACE_IMAGEN_1_CAPA_3]" crossorigin="anonymous" />
        <img id="img-1-3" src="[ENLACE_IMAGEN_1_CAPA_4]" crossorigin="anonymous" />
        <img id="img-1-4" src="[ENLACE_IMAGEN_1_CAPA_5]" crossorigin="anonymous" />
        <img id="img-1-5" src="[ENLACE_IMAGEN_1_CAPA_6]" crossorigin="anonymous" />
        <img id="img-1-6" src="[ENLACE_IMAGEN_1_CAPA_7]" crossorigin="anonymous" />

        <img id="img-2-0" src="[ENLACE_IMAGEN_2_CAPA_1]" crossorigin="anonymous" />
        <img id="img-2-1" src="[ENLACE_IMAGEN_2_CAPA_2]" crossorigin="anonymous" />
        <img id="img-2-2" src="[ENLACE_IMAGEN_2_CAPA_3]" crossorigin="anonymous" />
        <img id="img-2-3" src="[ENLACE_IMAGEN_2_CAPA_4]" crossorigin="anonymous" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-0" mindar-image-target="targetIndex: 0" freeze-tracking>
        <a-plane src="#img-0-0" position="0 0 0"    height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-0-1" position="0 0 0.15" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-0-2" position="0 0 0.30" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
      </a-entity>

      <a-entity id="target-1" mindar-image-target="targetIndex: 1" freeze-tracking>
        <a-plane src="#img-1-0" position="0 0 0"    height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-1" position="0 0 0.15" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-2" position="0 0 0.30" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-3" position="0 0 0.45" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-4" position="0 0 0.60" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-5" position="0 0 0.75" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-1-6" position="0 0 0.90" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
      </a-entity>

      <a-entity id="target-2" mindar-image-target="targetIndex: 2" freeze-tracking>
        <a-plane src="#img-2-0" position="0 0 0"    height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-2-1" position="0 0 0.15" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-2-2" position="0 0 0.30" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
        <a-plane src="#img-2-3" position="0 0 0.45" height="1.5" width="1.5" material="shader: flat; transparent: true; alphaTest: 0.5"></a-plane>
      </a-entity>

    </a-scene>

    <!-- CORRECCIÓN 4: Script movido fuera de <a-scene>, justo antes de </body> -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const scanningUI = document.querySelector("#scanning-ui");

        // CORRECCIÓN 3: Usar Set en lugar de contador para evitar desincronización
        const targetsActivos = new Set();

        for (let i = 0; i < 3; i++) {
          const targetEntity = document.querySelector(`#target-${i}`);
          
          targetEntity.addEventListener("targetFound", () => {
            targetsActivos.add(i);
            scanningUI.style.display = "none";
          });

          targetEntity.addEventListener("targetLost", () => {
            targetsActivos.delete(i);
            if (targetsActivos.size === 0) {
              scanningUI.style.display = "flex";
            }
          });
        }
      });
    </script>

  </body>
</html>
