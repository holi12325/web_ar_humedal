<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preload" as="image" href="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_0_C2.webp" crossorigin="anonymous" />
    <link rel="preload" as="image" href="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c2.webp" crossorigin="anonymous" />
    <link rel="preload" as="image" href="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_2_c2.webp" crossorigin="anonymous" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // ─── Detección de plataforma ───────────────────────────────────────────
      const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                     (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const IS_SAFARI = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      const IS_LOW_END = navigator.hardwareConcurrency <= 4;

      // lerpFactor más bajo en iOS/Safari para reducir jitter del stack WebRTC+canvas
      // Más bajo en dispositivos de gama baja para amortiguar más agresivamente
      const LERP_FACTOR = IS_IOS || IS_SAFARI ? 0.08 : IS_LOW_END ? 0.10 : 0.15;

      // ─── Componente smooth-tracking ───────────────────────────────────────
      AFRAME.registerComponent('smooth-tracking', {
        schema: {
          lerpFactor: { type: 'number', default: LERP_FACTOR }
        },

        init: function () {
          this.isTracking = false;

          this.targetPos   = new THREE.Vector3();
          this.targetQuat  = new THREE.Quaternion();
          this.targetScale = new THREE.Vector3(1, 1, 1);

          this.currentPos   = new THREE.Vector3();
          this.currentQuat  = new THREE.Quaternion();
          this.currentScale = new THREE.Vector3(1, 1, 1);

          // Acumulador para dead-zone: ignora deltas muy pequeños en iOS
          // que son puramente ruido del estimador de pose
          this._skipCount = 0;

          this.el.addEventListener('targetFound', () => {
            this.isTracking = true;
            this._skipCount = 0;

            // Snapshot inmediato para evitar "vuelo" desde el origen
            this.currentPos.copy(this.el.object3D.position);
            this.currentQuat.copy(this.el.object3D.quaternion);
            this.currentScale.copy(this.el.object3D.scale);
          });

          this.el.addEventListener('targetLost', () => {
            this.isTracking = false;
          });
        },

        tick: function (time, delta) {
          if (!this.isTracking) return;

          // Clamp delta: evita saltos enormes tras tab switch o pausa del browser
          const safeDelta = Math.min(delta, 50);

          // Factor de lerp independiente de framerate
          const t = 1 - Math.pow(1 - this.data.lerpFactor, safeDelta / 16.67);

          this.targetPos.copy(this.el.object3D.position);
          this.targetQuat.copy(this.el.object3D.quaternion);
          this.targetScale.copy(this.el.object3D.scale);

          // Dead-zone: si la diferencia es microscópica (ruido puro),
          // no actualizar para evitar microvibraciones en iOS
          const posDelta = this.currentPos.distanceTo(this.targetPos);
          if (posDelta < 0.0003 && this._skipCount < 10) {
            this._skipCount++;
            return;
          }
          this._skipCount = 0;

          this.currentPos.lerp(this.targetPos, t);
          this.currentQuat.slerp(this.targetQuat, t);
          this.currentScale.lerp(this.targetScale, t);

          this.el.object3D.position.copy(this.currentPos);
          this.el.object3D.quaternion.copy(this.currentQuat);
          this.el.object3D.scale.copy(this.currentScale);
        }
      });
    </script>

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        /* 100dvh: dynamic viewport height — crítico en iOS Safari
           para evitar que la barra de navegación rompa el layout */
        height: 100dvh;
        overflow: hidden;
        background: #000;
        /* Evita el bounce scroll en iOS que mueve todo el canvas */
        position: fixed;
        top: 0;
        left: 0;
      }

      a-scene {
        width: 100%;
        height: 100dvh;
        position: fixed;
        top: 0;
        left: 0;
        /* GPU compositing hint: reduce repaint en el thread principal */
        will-change: transform;
      }

      .scanning-ui {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 1.1em;
        text-align: center;
        z-index: 10;
        /* Transición más rápida — 0.5s se percibe lento en AR */
        transition: opacity 0.25s ease;
        pointer-events: none;
        /* Safe areas para dispositivos con notch (iPhone X+) */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
                 env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      .scanning-ui.hidden {
        opacity: 0;
      }

      .scanning-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 16px;
        opacity: 0.8;
      }

      /* Ocultar botón VR nativo de A-Frame */
      .a-enter-vr-button,
      .a-orientation-modal {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div id="scanning-ui" class="scanning-ui">
      <svg class="scanning-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8"  y="8"  width="16" height="4" rx="2" fill="white"/>
        <rect x="8"  y="8"  width="4"  height="16" rx="2" fill="white"/>
        <rect x="40" y="8"  width="16" height="4" rx="2" fill="white"/>
        <rect x="52" y="8"  width="4"  height="16" rx="2" fill="white"/>
        <rect x="8"  y="52" width="16" height="4" rx="2" fill="white"/>
        <rect x="8"  y="40" width="4"  height="16" rx="2" fill="white"/>
        <rect x="40" y="52" width="16" height="4" rx="2" fill="white"/>
        <rect x="52" y="40" width="4"  height="16" rx="2" fill="white"/>
        <circle cx="32" cy="32" r="6" stroke="white" stroke-width="2" opacity="0.6"/>
      </svg>
      <p>Apunta la cámara a una de las obras...</p>
    </div>

    <a-scene
      id="main-scene"
      mindar-image="imageTargetSrc: https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/targets (1).mind;
                    filterMinCF: 0.005;
                    filterBeta: 0.05;
                    missTolerance: 10;
                    warmupTolerance: 2;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: false; alpha: true; antialias: false; logarithmicDepthBuffer: false"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >

      <a-assets timeout="30000">
        <img id="img-0-0" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_0_C2.webp" crossorigin="anonymous" />
        <img id="img-0-1" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_0_c3.webp" crossorigin="anonymous" />

        <img id="img-1-0" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c2.webp" crossorigin="anonymous" />
        <img id="img-1-1" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c3.webp" crossorigin="anonymous" />
        <img id="img-1-2" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c4.webp" crossorigin="anonymous" />
        <img id="img-1-3" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c5.webp" crossorigin="anonymous" />
        <img id="img-1-4" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c6.webp" crossorigin="anonymous" />
        <img id="img-1-5" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_1_c7.webp" crossorigin="anonymous" />

        <img id="img-2-0" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_2_c2.webp" crossorigin="anonymous" />
        <img id="img-2-1" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_2_c3.webp" crossorigin="anonymous" />
        <img id="img-2-2" src="https://raw.githubusercontent.com/holi12325/web_ar_humedal/main/index_2_c4.webp" crossorigin="anonymous" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-0" mindar-image-target="targetIndex: 0" smooth-tracking>
        <a-plane src="#img-0-0" position="0 0 0"    height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -1; polygonOffsetUnits: -1">
        </a-plane>
        <a-plane src="#img-0-1" position="0 0 0.10" height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -2; polygonOffsetUnits: -2">
        </a-plane>
      </a-entity>

      <a-entity id="target-1" mindar-image-target="targetIndex: 1" smooth-tracking>
        <a-plane src="#img-1-0" position="0 0 0"    height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -1; polygonOffsetUnits: -1">
        </a-plane>
        <a-plane src="#img-1-1" position="0 0 0.10" height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -2; polygonOffsetUnits: -2">
        </a-plane>
        <a-plane src="#img-1-2" position="0 0 0.20" height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -3; polygonOffsetUnits: -3">
        </a-plane>
        <a-plane src="#img-1-3" position="0 0 0.30" height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -4; polygonOffsetUnits: -4">
        </a-plane>
        <a-plane src="#img-1-4" position="0 0 0.40" height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -5; polygonOffsetUnits: -5">
        </a-plane>
        <a-plane src="#img-1-5" position="0 0 0.50" height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -6; polygonOffsetUnits: -6">
        </a-plane>
      </a-entity>

      <a-entity id="target-2" mindar-image-target="targetIndex: 2" smooth-tracking>
        <a-plane src="#img-2-0" position="0 0 0"    height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -1; polygonOffsetUnits: -1">
        </a-plane>
        <a-plane src="#img-2-1" position="0 0 0.10" height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -2; polygonOffsetUnits: -2">
        </a-plane>
        <a-plane src="#img-2-2" position="0 0 0.20" height="1.94" width="1.5"
          material="shader: flat; transparent: true; alphaTest: 0.01;
                    polygonOffset: true; polygonOffsetFactor: -3; polygonOffsetUnits: -3">
        </a-plane>
      </a-entity>

    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const scanningUI  = document.getElementById("scanning-ui");
        const targetsActivos = new Set();
        const NUM_TARGETS = 3;

        for (let i = 0; i < NUM_TARGETS; i++) {
          const targetEntity = document.getElementById(`target-${i}`);

          targetEntity.addEventListener("targetFound", () => {
            targetsActivos.add(i);
            scanningUI.classList.add("hidden");
          });

          targetEntity.addEventListener("targetLost", () => {
            targetsActivos.delete(i);
            if (targetsActivos.size === 0) {
              scanningUI.classList.remove("hidden");
            }
          });
        }

        // ── iOS: forzar recalculo de viewport al rotar el dispositivo ────────
        // En Safari el cambio de orientación no dispara resize a tiempo
        if (IS_IOS) {
          const fixViewport = () => {
            const scene = document.getElementById("main-scene");
            if (scene) {
              scene.style.height = window.innerHeight + "px";
            }
          };
          window.addEventListener("orientationchange", () => {
            setTimeout(fixViewport, 300);
          });
          fixViewport();
        }

        // ── Prevenir scroll/bounce en iOS que mueve el canvas ────────────────
        document.addEventListener("touchmove", (e) => {
          e.preventDefault();
        }, { passive: false });
      });
    </script>

  </body>
</html>
